name: Publish Core SDK

on:
  workflow_dispatch:
    inputs:
      bump-type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      alpha:
        description: 'Publish as alpha pre-release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run automated release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the automated release script
          bash scripts/release-automated.sh core ${{ inputs.bump-type }} ${{ inputs.alpha }}

      - name: Create GitHub Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the new version and create release
          VERSION=$(node -p "require('./packages/core/package.json').version")
          TAG="core@$VERSION"

          # Extract latest changelog
          CHANGELOG_FILE="packages/core/CHANGELOG.md"
          if [ -f "$CHANGELOG_FILE" ]; then
            LATEST_NOTES=$(awk '/^---$/ { exit } { print }' "$CHANGELOG_FILE")
            gh release create "$TAG" --title "🚀 $TAG" --notes "$LATEST_NOTES" --latest
          else
            gh release create "$TAG" --title "🚀 $TAG" --notes "Automated release of $TAG" --latest
          fi
